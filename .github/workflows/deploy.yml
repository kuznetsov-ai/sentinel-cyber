name: Deploy to Silver Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-sentinel
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_KEY: ${{ secrets.SENTINEL_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 89.167.108.210 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to server
        # NOTE: --delete is intentionally omitted. The remote /opt/sentinel-cyber/
        # also holds runtime artefacts the repo doesn't (and shouldn't) ship:
        #   - .env             environment file with secrets / port / NODE_ENV
        #   - server.log       systemd append-target
        #   - db/sessions/*    per-visitor SQLite sandboxes
        # Wiping them on every deploy breaks the unit (no .env → "Failed to load
        # environment files") and erases live demo state. If you ever need to
        # purge stale repo files, do it manually as root.
        run: |
          rsync -az \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='db/sentinel.db' \
            --exclude='db/sentinel.db-shm' \
            --exclude='db/sentinel.db-wal' \
            --exclude='db/sessions' \
            --exclude='.DS_Store' \
            -e 'ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no' \
            ./ sentinel-deploy@89.167.108.210:/opt/sentinel-cyber/

      - name: Install deps + restart service
        # No `chown` step: /opt/sentinel-cyber is owned by sentinel-deploy:sentinel
        # with setgid+g+rwX, so the runtime user `sentinel` reads/writes through
        # group membership without needing to own the files. Re-chowning to
        # sentinel:sentinel would strip rsync's ability to set mtimes on the
        # next deploy.
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            sentinel-deploy@89.167.108.210 '
              set -e
              cd /opt/sentinel-cyber
              npm ci --omit=dev
              sudo /usr/bin/systemctl restart sentinel-cyber
            '

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            sleep 3
            code=$(curl -s -o /dev/null -w "%{http_code}" https://sentinel.ekuznetsov.dev/)
            if [ "$code" = "200" ]; then
              echo "Smoke test passed (HTTP $code)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $code, retrying..."
          done
          echo "Smoke test failed"
          exit 1
